# Reusable workflow: deploy a build artifact via lftp/FTPS mirror to a remote path.
# In the caller: `needs: [ build ]` and the same `artifact-name` as wordpress-bedrock-build.
# GitHub Environment is derived from the branch: `main` → production, any other ref → staging.
# Create `production` and `staging` Environments on the repo; put LFTP_SITE, LFTP_USER, LFTP_PASSWORD on each.
on:
  workflow_call:
    inputs:
      mirror-exclude-rx-from:
        description: "Path to the regex exclude list inside the artifact (one pattern
          per line)."
        type: string
        default: ".bsaweb/ci-cd/lftp-exclude-regex.txt"
      mirror-remote-path:
        description: "Remote path on the server (e.g. /httpdocs)."
        type: string
        required: true
      artifact-name:
        description: "Artifact to download; must match wordpress-bedrock-build."
        type: string
        default: "bedrock-build"
      mirror-parallel:
        description: "lftp mirror --parallel N."
        type: number
        default: 5
      mirror-dry-run:
        description: "Pass --dry-run to lftp mirror (simulate without transferring files)."
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # `github` context: ref is always set for the run (works inside reusable workflows).
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'production' || 'staging'
      }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: _deploy

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Mirror to FTPS
        working-directory: _deploy
        env:
          EXFILE: ${{ inputs.mirror-exclude-rx-from }}
          REMOTE: ${{ inputs.mirror-remote-path }}
          PAR: ${{ inputs.mirror-parallel }}
          MIRROR_DRY_RUN: ${{ inputs.mirror-dry-run }}
          LFTP_SITE: ${{ secrets.LFTP_SITE }}
          LFTP_USER: ${{ secrets.LFTP_USER }}
          LFTP_PASSWORD: ${{ secrets.LFTP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$EXFILE" ] && [ ! -f "$EXFILE" ]; then
            echo "ERROR: exclude file '$EXFILE' not found in artifact — aborting to avoid unprotected --delete." >&2
            exit 1
          fi
          {
            echo "set net:reconnect-interval-base 5"
            echo "set net:max-retries 2"
            echo "set ftps:initial-prot ''"
            echo "set ftp:ssl-force true"
            echo "set ftp:ssl-protect-data true"
            echo "set ssl:verify-certificate no"
            echo "set sftp:auto-confirm yes"
            printf 'open -u %s,%s %s\n' "$LFTP_USER" "$LFTP_PASSWORD" "$LFTP_SITE"
            echo -n "mirror"
            if [ "$MIRROR_DRY_RUN" = "true" ]; then
              echo -n " --dry-run"
            fi
            if [ -n "$EXFILE" ] && [ -f "$EXFILE" ]; then
              while IFS= read -r line || [ -n "${line-}" ]; do
                line="${line#"${line%%[![:space:]]*}"}"; line="${line%"${line##*[![:space:]]}"}"
                if [ -z "$line" ]; then
                  continue
                fi
                case "$line" in \#*) continue;; esac
                # Regex lines (e.g. ^\.git$); lftp uses rx: for regex in -X.
                printf ' -X "rx:%s"' "$line"
              done < "$EXFILE"
            fi
            echo " --no-empty-dirs --delete --verbose --parallel=$PAR -R . $REMOTE"
            echo "quit"
          } > /tmp/lftp.script
          lftp -f /tmp/lftp.script
