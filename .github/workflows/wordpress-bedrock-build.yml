# Reusable workflow: WordPress Bedrock build (PHP + Node), artifact for deploy.
# Call from a site repo: uses: bsaweb/actions/.github/workflows/wordpress-bedrock-build.yml@<ref>
on:
  workflow_call:
    inputs:
      php-version:
        description: "PHP version for the runner."
        type: string
        default: "8.2"
      node-version:
        description: "Node.js version."
        type: string
        default: "20"
      working-directory:
        description: "Repository root for composer/npm; use . for monorepo root."
        type: string
        default: "."
      composer-install-args:
        description: "Arguments passed to composer install (leading command name omitted)."
        type: string
        default: "--no-dev --prefer-dist --no-interaction --optimize-autoloader"
      run-npm:
        description: "Run npm ci and npm run build if package.json exists at
          working-directory."
        type: boolean
        default: true
      artifact-name:
        description: "Uploaded artifact name for deploy jobs to download."
        type: string
        default: "bedrock-build"
      npm-bsaweb-registry-url:
        description: "GitLab npm registry URL for @bsaweb scoped packages."
        type: string
        default: ""
    secrets:
      COMPOSER_BSAWEB_SATIS_REGISTRY_USER:
        description: "Username (basic auth) for satis.bsa-web.fr."
        required: false
      COMPOSER_BSAWEB_SATIS_REGISTRY_PASSWORD:
        description: "Password (basic auth) for satis.bsa-web.fr and composer.bsa-web.fr."
        required: false
      COMPOSER_BSAWEB_SATISPRESS_REGISTRY_USER:
        description: "Username (basic auth) for composer.bsa-web.fr (SatisPress)."
        required: false
      COMPOSER_BSAWEB_GITLAB_REGISTRY_TOKEN:
        description: "GitLab token for VCS access on gitlab.bsa-web.fr."
        required: false
      COMPOSER_ECOLES_CREATIVES_GITLAB_REGISTRY_TOKEN:
        description: "Deploy token for the GitLab group Composer package registry on
          gitlab.bsa-web.fr."
        required: false
      NPM_BSAWEB_REGISTRY_TOKEN:
        description: "GitLab deploy token (read_package_registry) for @bsaweb scoped
          packages."
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          tools: composer
          coverage: none
          extensions: mbstring, exif, intl, bcmath, zip, opcache, mysqli, pdo_mysql, xml,
            dom, iconv, gd, curl

      - name: Get Composer cache directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
        working-directory: ${{ inputs.working-directory }}

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Configure Composer auth
        env:
          SATIS_USER: ${{ secrets.COMPOSER_BSAWEB_SATIS_REGISTRY_USER }}
          SATIS_PASSWORD: ${{ secrets.COMPOSER_BSAWEB_SATIS_REGISTRY_PASSWORD }}
          SATISPRESS_USER: ${{ secrets.COMPOSER_BSAWEB_SATISPRESS_REGISTRY_USER }}
          BSAWEB_GITLAB_TOKEN: ${{ secrets.COMPOSER_BSAWEB_GITLAB_REGISTRY_TOKEN }}
          ECOLES_CREATIVES_TOKEN: ${{ secrets.COMPOSER_ECOLES_CREATIVES_GITLAB_REGISTRY_TOKEN }}
        run: |
          if [ -n "$SATIS_USER" ]; then
            composer config --global --auth http-basic.satis.bsa-web.fr "$SATIS_USER" "$SATIS_PASSWORD"
          fi
          if [ -n "$SATISPRESS_USER" ]; then
            composer config --global --auth http-basic.composer.bsa-web.fr "$SATISPRESS_USER" "satispress"
          fi
          if [ -n "$BSAWEB_GITLAB_TOKEN" ]; then
            composer config --global --auth gitlab-token.gitlab.bsa-web.fr "$BSAWEB_GITLAB_TOKEN"
          fi
          if [ -n "$ECOLES_CREATIVES_TOKEN" ]; then
            composer config --global --auth http-basic.gitlab.bsa-web.fr "__token__" "$ECOLES_CREATIVES_TOKEN"
          fi

      - name: Composer install
        run: composer install ${{ inputs.composer-install-args }}
        working-directory: ${{ inputs.working-directory }}

      - name: Use Node
        if: inputs.run-npm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ format('{0}/package-lock.json', inputs.working-directory) }}

      - name: Configure @bsaweb npm registry
        if: inputs.run-npm && inputs.npm-bsaweb-registry-url != ''
        env:
          REGISTRY_URL: ${{ inputs.npm-bsaweb-registry-url }}
          TOKEN: ${{ secrets.NPM_BSAWEB_REGISTRY_TOKEN }}
        run: |
          REGISTRY_HOST="${REGISTRY_URL#https:}"
          printf '@bsaweb:registry=%s\n//%s:_authToken=%s\n' \
            "$REGISTRY_URL" "$REGISTRY_HOST" "$TOKEN" >> ~/.npmrc

      - name: npm ci and build
        if: inputs.run-npm
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build --if-present
          else
            echo "No package.json; skipping Node steps."
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          # Full tree after Composer + npm; lftp step mirrors the same tree to the server.
          path: "."
          if-no-files-found: error
