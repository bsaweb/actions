name: lftp FTPS deploy
description: Mirror a build artifact to a remote path via lftp/FTPS.
inputs:
  lftp-site:
    description: "FTP/FTPS hostname."
    required: true
  lftp-user:
    description: "FTP username."
    required: true
  lftp-password:
    description: "FTP password."
    required: true
  mirror-exclude-rx-from:
    description: "Path to the regex exclude list inside the artifact (one pattern per line)."
    required: false
    default: ".bsaweb/ci-cd/lftp-exclude-regex.txt"
  mirror-remote-path:
    description: "Remote path on the server (e.g. /httpdocs)."
    required: true
  artifact-name:
    description: "Artifact to download; must match wordpress-bedrock-build."
    required: false
    default: "bedrock-build"
  mirror-parallel:
    description: "lftp mirror --parallel N."
    required: false
    default: "5"
  mirror-dry-run:
    description: "Pass --dry-run to lftp mirror (simulate without transferring files)."
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: _deploy

    - name: Install lftp
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Debug — check inputs
      shell: bash
      env:
        LFTP_SITE: ${{ inputs.lftp-site }}
        LFTP_USER: ${{ inputs.lftp-user }}
        LFTP_PASSWORD: ${{ inputs.lftp-password }}
      run: |
        echo "remote-path  : ${{ inputs.mirror-remote-path }}"
        echo "exclude-file : ${{ inputs.mirror-exclude-rx-from }}"
        echo "dry-run      : ${{ inputs.mirror-dry-run }}"
        echo "LFTP_SITE    : $( [ -n "$LFTP_SITE" ]     && echo "set (${#LFTP_SITE} chars)"     || echo "EMPTY" )"
        echo "LFTP_USER    : $( [ -n "$LFTP_USER" ]     && echo "set (${#LFTP_USER} chars)"     || echo "EMPTY" )"
        echo "LFTP_PASSWORD: $( [ -n "$LFTP_PASSWORD" ] && echo "set (${#LFTP_PASSWORD} chars)" || echo "EMPTY" )"

    - name: Mirror to FTPS
      shell: bash
      working-directory: _deploy
      env:
        EXFILE: ${{ inputs.mirror-exclude-rx-from }}
        REMOTE: ${{ inputs.mirror-remote-path }}
        PAR: ${{ inputs.mirror-parallel }}
        MIRROR_DRY_RUN: ${{ inputs.mirror-dry-run }}
        LFTP_SITE: ${{ inputs.lftp-site }}
        LFTP_USER: ${{ inputs.lftp-user }}
        LFTP_PASSWORD: ${{ inputs.lftp-password }}
      run: |
        set -euo pipefail
        if [ -n "$EXFILE" ] && [ ! -f "$EXFILE" ]; then
          echo "ERROR: exclude file '$EXFILE' not found in artifact — aborting to avoid unprotected --delete." >&2
          exit 1
        fi
        {
          echo "set net:reconnect-interval-base 5"
          echo "set net:max-retries 2"
          echo "set ftps:initial-prot ''"
          echo "set ftp:ssl-force true"
          echo "set ftp:ssl-protect-data true"
          echo "set ssl:verify-certificate no"
          echo "set sftp:auto-confirm yes"
          printf 'open -u %s,%s %s\n' "$LFTP_USER" "$LFTP_PASSWORD" "$LFTP_SITE"
          echo -n "mirror"
          if [ "$MIRROR_DRY_RUN" = "true" ]; then
            echo -n " --dry-run"
          fi
          if [ -n "$EXFILE" ] && [ -f "$EXFILE" ]; then
            while IFS= read -r line || [ -n "${line-}" ]; do
              line="${line#"${line%%[![:space:]]*}"}"; line="${line%"${line##*[![:space:]]}"}"
              if [ -z "$line" ]; then
                continue
              fi
              case "$line" in \#*) continue;; esac
              # Regex lines (e.g. ^\.git$); lftp uses rx: for regex in -X.
              printf ' -X "rx:%s"' "$line"
            done < "$EXFILE"
          fi
          echo " --no-empty-dirs --delete --verbose --parallel=$PAR -R . $REMOTE"
          echo "quit"
        } > /tmp/lftp.script
        echo "--- lftp script ---"
        cat /tmp/lftp.script
        echo "-------------------"
        lftp -f /tmp/lftp.script
